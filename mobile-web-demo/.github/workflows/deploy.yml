name: Simple GitHub Pages Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create deployment notification
        run: |
          # 创建部署信息文件
          echo "=== Deployment Information ===" > deploy-info.txt
          echo "Repository: ${{ github.repository }}" >> deploy-info.txt
          echo "Commit: ${{ github.sha }}" >> deploy-info.txt
          echo "Branch: ${{ github.ref }}" >> deploy-info.txt
          echo "Date: $(date)" >> deploy-info.txt
          
          # 生成访问链接
          REPO_NAME=$(echo ${{ github.repository }} | cut -d '/' -f 2)
          OWNER_NAME=$(echo ${{ github.repository }} | cut -d '/' -f 1)
          DEPLOY_URL="https://$OWNER_NAME.github.io/$REPO_NAME"
          echo "URL: $DEPLOY_URL" >> deploy-info.txt
          
          # QR Code API
          QR_API_URL="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=$DEPLOY_URL"
          echo "QR URL: $QR_API_URL" >> deploy-info.txt
          
          echo "=== Deployment Complete ===" >> deploy-info.txt