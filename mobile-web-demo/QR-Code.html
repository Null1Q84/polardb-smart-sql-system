<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码访问 - 手机端指挥开发演示</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .qr-container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        .qr-placeholder {
            width: 250px;
            height: 250px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            margin: 30px auto;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        
        .qr-text {
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
        }
        
        .deploy-info {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        
        .deploy-info h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .info-item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        .info-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            font-size: 1.2rem;
            color: #667eea;
        }
        
        .info-text {
            color: #555;
        }
        
        .qr-tip {
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .qr-container {
                padding: 20px;
            }
            
            .qr-placeholder {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>📱 手机端指挥开发演示</h1>
        
        <div class="qr-placeholder">
            <div class="qr-text">QR Code<br>Here</div>
        </div>
        
        <div class="deploy-info">
            <h2>🚀 部署流程说明</h2>
            
            <div class="info-item">
                <div class="info-icon">1️⃣</div>
                <div class="info-text">在元宝手机端发送指令给我</div>
            </div>
            
            <div class="info-item">
                <div class="info-icon">2️⃣</div>
                <div class="info-text">我会修改代码并提交到 GitHub</div>
            </div>
            
            <div class="info-item">
                <div class="info-icon">3️⃣</div>
                <div class="info-text">GitHub Actions 自动部署到 GitHub Pages</div>
            </div>
            
            <div class="info-item">
                <div class="info-icon">4️⃣</div>
                <div class="info-text">手机扫码或访问链接查看最新版本</div>
            </div>
        </div>
        
        <p class="qr-tip">✅ 扫描二维码或用手机浏览器访问部署链接即可体验最新功能</p>
    </div>
</body>
</html>
