<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI功能测试页面</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }
        
        .test-box {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        button {
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        canvas {
            width: 100%;
            height: 200px;
            background-color: #eee;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h2>AI艺术作品生成</h2>
        <canvas id="art-canvas"></canvas>
        <button id="generate-art">生成艺术</button>
    </div>
    
    <div class="test-box">
        <h2>AI对话模拟</h2>
        <div id="ai-response">你好！我是AI助手</div>
        <input type="text" id="user-input" placeholder="输入你想说的话...">
        <button id="send-message">发送</button>
    </div>
    
    <div class="test-box">
        <h2>AI诗词生成</h2>
        <div id="poetry-content"></div>
        <button id="generate-poetry">生成诗词</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
