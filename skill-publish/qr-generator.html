<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #764ba2;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .qr-img {
            margin: 20px 0;
            border: 3px solid #764ba2;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Generator</h1>
        <p>Generate QR codes for GitHub Pages URLs</p>
        
        <input type="text" id="url-input" placeholder="Enter GitHub Pages URL" 
               value="https://github.com/username/gh-pages-skill">
        
        <button onclick="generateQR()">Generate QR Code</button>
        
        <div id="qr-container"></div>
        
        <script>
            function generateQR() {
                const url = document.getElementById('url-input').value;
                const qrContainer = document.getElementById('qr-container');
                
                qrContainer.innerHTML = `
                    <h2>QR Code for: ${url}</h2>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}" 
                         class="qr-img" alt="QR Code">
                    <p>Scan with your mobile device</p>
                `;
            }
            
            // Generate initial QR code
            generateQR();
        </script>
    </div>
</body>
</html>
